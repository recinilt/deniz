<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>112 Temel Eğitim - Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2235;
  --surface3: #222d42;
  --accent: #38bdf8;
  --accent2: #818cf8;
  --accent3: #34d399;
  --danger: #f87171;
  --warn: #fbbf24;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --gold: #f59e0b;
  --silver: #94a3b8;
  --bronze: #d97706;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(56,189,248,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(129,140,248,0.05) 0%, transparent 50%);
  z-index: 0;
  pointer-events: none;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* ===== HEADER ===== */
.app-header {
  text-align: center;
  padding: 30px 0 20px;
}

.app-header h1 {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.app-header p {
  color: var(--text3);
  font-size: 0.85rem;
  margin-top: 6px;
  font-weight: 300;
}

/* ===== STATS BAR ===== */
.stats-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  justify-content: center;
}

.stat-card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 14px 20px;
  text-align: center;
  flex: 1;
  min-width: 120px;
  max-width: 180px;
}

.stat-card .stat-val {
  font-size: 1.5rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

.stat-card .stat-label {
  font-size: 0.7rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}

.stat-val.accent { color: var(--accent); }
.stat-val.green { color: var(--accent3); }
.stat-val.warn { color: var(--warn); }

/* ===== BÖLÜM KARTLARI ===== */
#bolum-secim { display: block; }
#quiz-ekrani { display: none; }
#sonuc-ekrani { display: none; }

.bolum-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}

.bolum-card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.bolum-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(to bottom, var(--accent), var(--accent2));
  opacity: 0;
  transition: opacity 0.25s;
}

.bolum-card:hover {
  border-color: rgba(56,189,248,0.2);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.bolum-card:hover::before { opacity: 1; }

.bolum-card .bolum-no {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 1px;
}

.bolum-card .bolum-title {
  font-size: 0.92rem;
  font-weight: 600;
  margin: 6px 0 10px;
  line-height: 1.35;
}

.bolum-card .bolum-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.75rem;
  color: var(--text3);
}

.bolum-card .bolum-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.progress-mini {
  width: 100%;
  height: 4px;
  background: var(--surface3);
  border-radius: 2px;
  margin-top: 12px;
  overflow: hidden;
}

.progress-mini .fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  transition: width 0.4s ease;
}

.badge-mini {
  font-size: 1rem;
  margin-left: auto;
}

/* ===== QUIZ EKRANI ===== */
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.quiz-header .back-btn {
  background: none;
  border: 1px solid var(--surface3);
  color: var(--text2);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  transition: all 0.2s;
}

.quiz-header .back-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.quiz-progress-wrap {
  width: 100%;
  margin-bottom: 20px;
}

.quiz-progress-bar {
  width: 100%;
  height: 6px;
  background: var(--surface3);
  border-radius: 3px;
  overflow: hidden;
}

.quiz-progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.4s ease;
}

.quiz-progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--text3);
  margin-top: 6px;
  font-family: 'JetBrains Mono', monospace;
}

.question-card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 16px;
  animation: fadeUp 0.35s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.question-card .q-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.question-card .q-text {
  font-size: 1.05rem;
  font-weight: 500;
  line-height: 1.55;
  margin-bottom: 22px;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  background: var(--surface2);
  border: 1.5px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 14px 18px;
  text-align: left;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.92rem;
  color: var(--text);
  transition: all 0.2s;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  line-height: 1.4;
}

.option-btn .opt-letter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text3);
  min-width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  background: var(--surface3);
  flex-shrink: 0;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--accent);
  background: rgba(56,189,248,0.06);
}

.option-btn:hover:not(.disabled) .opt-letter {
  background: var(--accent);
  color: var(--bg);
}

.option-btn.correct {
  border-color: var(--accent3);
  background: rgba(52,211,153,0.1);
}

.option-btn.correct .opt-letter {
  background: var(--accent3);
  color: var(--bg);
}

.option-btn.wrong {
  border-color: var(--danger);
  background: rgba(248,113,113,0.1);
}

.option-btn.wrong .opt-letter {
  background: var(--danger);
  color: var(--bg);
}

.option-btn.disabled { cursor: default; pointer-events: none; }

.explanation-box {
  background: var(--surface2);
  border-left: 3px solid var(--accent2);
  border-radius: 0 10px 10px 0;
  padding: 16px 18px;
  margin-top: 16px;
  font-size: 0.88rem;
  line-height: 1.55;
  color: var(--text2);
  animation: fadeUp 0.3s ease;
}

.explanation-box strong {
  color: var(--accent3);
}

.next-btn {
  display: none;
  margin: 20px auto 0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: #fff;
  padding: 14px 40px;
  border-radius: 10px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 0.3px;
}

.next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(56,189,248,0.25); }

/* ===== SONUÇ EKRANI ===== */
.result-card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 36px;
  text-align: center;
  animation: fadeUp 0.4s ease;
}

.result-card .result-badge {
  font-size: 3.5rem;
  margin-bottom: 12px;
}

.result-card .result-title {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 6px;
}

.result-card .result-sub {
  color: var(--text3);
  font-size: 0.9rem;
  margin-bottom: 24px;
}

.result-stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}

.result-stat {
  text-align: center;
}

.result-stat .rs-val {
  font-size: 1.8rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

.result-stat .rs-label {
  font-size: 0.72rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.result-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.result-actions button {
  padding: 12px 28px;
  border-radius: 10px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
}

.btn-secondary {
  background: var(--surface2);
  border: 1px solid var(--surface3) !important;
  color: var(--text2);
}

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(56,189,248,0.25); }
.btn-secondary:hover { border-color: var(--accent) !important; color: var(--accent); }

/* ===== YANLIŞ GÖZDEN GEÇİRME ===== */
#yanlis-listesi { display: none; }

.yanlis-card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  animation: fadeUp 0.3s ease;
}

.yanlis-card .yq-text {
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 0.95rem;
}

.yanlis-card .yq-wrong {
  color: var(--danger);
  font-size: 0.85rem;
  margin-bottom: 4px;
}

.yanlis-card .yq-correct {
  color: var(--accent3);
  font-size: 0.85rem;
  margin-bottom: 8px;
}

.yanlis-card .yq-explain {
  color: var(--text3);
  font-size: 0.82rem;
  line-height: 1.5;
  border-top: 1px solid var(--surface3);
  padding-top: 8px;
  margin-top: 4px;
}

/* ===== FOOTER ===== */
.app-footer {
  text-align: center;
  padding: 30px 0;
  font-size: 0.72rem;
  color: var(--text3);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .app-header h1 { font-size: 1.25rem; }
  .bolum-grid { grid-template-columns: 1fr; }
  .stat-card { min-width: 90px; padding: 10px 14px; }
  .stat-card .stat-val { font-size: 1.2rem; }
  .question-card { padding: 20px; }
  .result-card { padding: 24px; }
}

/* ===== STREAK ANİMASYON ===== */
.streak-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: var(--surface);
  border: 2px solid var(--warn);
  border-radius: 16px;
  padding: 20px 36px;
  text-align: center;
  z-index: 100;
  box-shadow: 0 0 60px rgba(251,191,36,0.2);
  transition: transform 0.3s ease;
}

.streak-popup.show { transform: translate(-50%, -50%) scale(1); }
.streak-popup .streak-emoji { font-size: 2.5rem; }
.streak-popup .streak-text { font-weight: 700; color: var(--warn); margin-top: 4px; }
</style>
</head>
<body>

<div class="container">
  <!-- HEADER -->
  <div class="app-header">
    <h1>🏥 112 Temel Eğitim Quiz</h1>
    <p>Sağlık Çalışanları Temel Eğitim Kitabı — 21 Bölüm</p>

  <!-- GENEL İSTATİSTİK -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-val accent" id="stat-tamamlanan">0</div>
      <div class="stat-label">Tamamlanan</div>
    </div>
    <div class="stat-card">
      <div class="stat-val green" id="stat-basari">—</div>

      <div class="stat-val warn" id="stat-streak">0</div>

  <!-- BÖLÜM SEÇİM EKRANI -->
  <div id="bolum-secim">
    <div class="bolum-grid" id="bolum-grid"></div>
  </div>

  <!-- QUIZ EKRANI -->
  <div id="quiz-ekrani">
    <div class="quiz-header">
      <button class="back-btn" onclick="geriDon()">← Bölümler</button>
      <div id="quiz-bolum-title" style="font-weight:600; font-size:0.95rem;"></div>
    </div>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar"><div class="fill" id="quiz-progress-fill"></div></div>
      <div class="quiz-progress-text">
        <span>Soru <span id="q-current">1</span>/<span id="q-total">20</span></span>
        <span>Puan: <span id="q-score">0</span></span>

    <button class="next-btn" id="next-btn" onclick="sonrakiSoru()">Sonraki Soru →</button>

      <div class="result-badge" id="result-badge">🥇</div>

      <div class="result-sub" id="result-sub">Bölüm tamamlandı</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="rs-val green" id="res-dogru">0</div>
          <div class="rs-label">Doğru</div>
        </div>
        <div class="result-stat">
          <div class="rs-val" style="color:var(--danger)" id="res-yanlis">0</div>
          <div class="rs-label">Yanlış</div>
        </div>
        <div class="result-stat">
          <div class="rs-val accent" id="res-puan">0</div>

        </div>
        <div class="result-stat">
          <div class="rs-val warn" id="res-yuzde">0%</div>
          <div class="rs-label">Başarı</div>
        </div>
      </div>
      <div class="result-actions">
        <button class="btn-primary" onclick="tekrarDene()">🔄 Tekrar Dene</button>
        <button class="btn-secondary" onclick="yanlislariGor()">📋 Yanlışları Gör</button>
        <button class="btn-secondary" onclick="geriDon()">← Bölümler</button>
      </div>
    </div>
    <div id="yanlis-listesi" style="margin-top:20px;"></div>
  </div>

  <div class="app-footer">
    Sağlık Bakanlığı — Sağlık Çalışanları Temel Eğitim Kitabı (2015) temel alınmıştır.
  </div>
</div>

<!-- STREAK POPUP -->
<div class="streak-popup" id="streak-popup">
  <div class="streak-emoji">🔥</div>
  <div class="streak-text" id="streak-text">5 Art Arda!</div>
</div>

<script>
// ===== VERİ YÖNETİMİ =====
const STORAGE_KEY = 'saglik112_quiz_v1';

function yukleVeri() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return d || {};
  } catch(e) { return {}; }
}

function kaydetVeri(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function bolumVerisi(bolumId) {
  const data = yukleVeri();
  return data[bolumId] || { enYuksek: 0, enYuksekYuzde: 0, denemeSayisi: 0 };
}

function bolumKaydet(bolumId, puan, yuzde) {
  const data = yukleVeri();
  const prev = data[bolumId] || { enYuksek: 0, enYuksekYuzde: 0, denemeSayisi: 0 };
  data[bolumId] = {
    enYuksek: Math.max(prev.enYuksek, puan),
    enYuksekYuzde: Math.max(prev.enYuksekYuzde, yuzde),
    denemeSayisi: prev.denemeSayisi + 1
  };
  kaydetVeri(data);
}

function genelIstatistik() {
  const data = yukleVeri();
  let toplam = 0, basariToplam = 0, maxStreak = data._maxStreak || 0;
  for (const key in data) {
    if (key.startsWith('bolum') && data[key].denemeSayisi > 0) {
      toplam++;
      basariToplam += data[key].enYuksekYuzde;
    }
  }
  return {
    tamamlanan: toplam,
    ortBasari: toplam > 0 ? Math.round(basariToplam / toplam) : 0,
    maxStreak: maxStreak
  };
}

function maxStreakKaydet(streak) {
  const data = yukleVeri();
  data._maxStreak = Math.max(data._maxStreak || 0, streak);
  kaydetVeri(data);
}

// ===== BÖLÜM TANIMLARI =====
const BOLUMLER = [
  { id: 'bolum01', no: 1, title: 'Erişkinlerde Yabancı Cisme Bağlı Havayolu Tıkanıklıkları ve Temel Yaşam Desteği', js: 'js/bolum01.js' },
  { id: 'bolum02', no: 2, title: 'Bebek ve Çocuklarda Yabancı Cisme Bağlı Havayolu Tıkanıklıkları ve TYD', js: 'js/bolum02.js' },
  { id: 'bolum03', no: 3, title: 'Acil Olgu Yönetimi', js: 'js/bolum03.js' },
  { id: 'bolum04', no: 4, title: 'Erişkinlerde Havayolu Açıklığı ve Ventilasyonun Sağlanması', js: 'js/bolum04.js' },
  { id: 'bolum05', no: 5, title: 'Bebek ve Çocuklarda Havayolu Açıklığı ve Ventilasyonun Sağlanması', js: 'js/bolum05.js' },
  { id: 'bolum06', no: 6, title: 'Solunum Yetmezliği Olan Hastaya Yaklaşım', js: 'js/bolum06.js' },
  { id: 'bolum07', no: 7, title: 'Şok ve Tedavisi', js: 'js/bolum07.js' },
  { id: 'bolum08', no: 8, title: 'Damaryolu Açma', js: 'js/bolum08.js' },
  { id: 'bolum09', no: 9, title: 'Temel EKG (Elektrokardiografi)', js: 'js/bolum09.js' },
  { id: 'bolum10', no: 10, title: 'Arrest Ritimlerin Yönetimi', js: 'js/bolum10.js' },
  { id: 'bolum11', no: 11, title: 'Periarrest Aritmiler', js: 'js/bolum11.js' },
  { id: 'bolum12', no: 12, title: 'Kanama ve Yaralanmalarda Acil Bakım İlkeleri', js: 'js/bolum12.js' },
  { id: 'bolum13', no: 13, title: 'Hastane Öncesinde Travma Hastasına Yaklaşım', js: 'js/bolum13.js' },
  { id: 'bolum14', no: 14, title: 'Bilinç Bozukluğu ve Nörolojik Aciller', js: 'js/bolum14.js' },
  { id: 'bolum15', no: 15, title: 'Obstetrik Aciller ve Yenidoğanın Değerlendirilmesi', js: 'js/bolum15.js' },
  { id: 'bolum16', no: 16, title: 'Olay Yeri Yönetimi', js: 'js/bolum16.js' },
  { id: 'bolum17', no: 17, title: 'Triaj', js: 'js/bolum17.js' },
  { id: 'bolum18', no: 18, title: 'Haberleşme', js: 'js/bolum18.js' },
  { id: 'bolum19', no: 19, title: 'Asepsi, Antisepsi, Sterilizasyon ve Dezenfeksiyon', js: 'js/bolum19.js' },
  { id: 'bolum20', no: 20, title: 'Ambulanslar, Acil Sağlık Araçları ve Donanımları', js: 'js/bolum20.js' },
  { id: 'bolum21', no: 21, title: 'Hasta Taşıma Teknikleri', js: 'js/bolum21.js' }
];

// ===== QUIZ DEĞİŞKENLERİ =====
let aktifBolum = null;
let sorular = [];
let mevcutSoru = 0;
let puan = 0;
let dogruSayisi = 0;
let yanlisSayisi = 0;
let streak = 0;
let yanlislar = [];
let cevaplandiMi = false;

// ===== EKRAN YÖNETİMİ =====
function ekranGoster(id) {
  document.getElementById('bolum-secim').style.display = 'none';
  document.getElementById('quiz-ekrani').style.display = 'none';
  document.getElementById('sonuc-ekrani').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

// ===== BÖLÜM KARTLARINI OLUŞTUR =====
function bolumKartlariniOlustur() {
  const grid = document.getElementById('bolum-grid');
  grid.innerHTML = '';
  BOLUMLER.forEach(b => {
    const veri = bolumVerisi(b.id);
    const rozet = veri.enYuksekYuzde >= 95 ? '🥇' : veri.enYuksekYuzde >= 80 ? '🥈' : veri.enYuksekYuzde >= 60 ? '🥉' : '';
    const card = document.createElement('div');
    card.className = 'bolum-card';
    card.onclick = () => bolumBaslat(b);
    card.innerHTML = `
      <div class="bolum-no">BÖLÜM ${String(b.no).padStart(2,'0')}</div>
      <div class="bolum-title">${b.title}</div>
      <div class="bolum-meta">
        <span>📝 ${veri.denemeSayisi} deneme</span>
        <span>🏆 %${veri.enYuksekYuzde}</span>
        <span class="badge-mini">${rozet}</span>
      </div>
      <div class="progress-mini"><div class="fill" style="width:${veri.enYuksekYuzde}%"></div></div>
    `;
    grid.appendChild(card);
  });
  istatistikGuncelle();
}

function istatistikGuncelle() {
  const s = genelIstatistik();
  document.getElementById('stat-tamamlanan').textContent = s.tamamlanan + '/21';
  document.getElementById('stat-basari').textContent = s.tamamlanan > 0 ? '%' + s.ortBasari : '—';
  document.getElementById('stat-streak').textContent = s.maxStreak;
}

// ===== BÖLÜM BAŞLAT =====
function bolumBaslat(bolum) {
  aktifBolum = bolum;
  // Soruları kontrol et
  if (!window[bolum.id + '_sorular']) {
    alert('Bu bölümün soruları henüz yüklenmedi. İlgili JS dosyasını ekleyin.');
    return;
  }
  // Soruları karıştır
  sorular = [...window[bolum.id + '_sorular']].sort(() => Math.random() - 0.5);
  // Her sorunun şıklarını da karıştır
  sorular.forEach(s => {
    const dogruCevap = s.options[s.correct];
    const shuffled = [...s.options].sort(() => Math.random() - 0.5);
    s.correct = shuffled.indexOf(dogruCevap);
    s.options = shuffled;
  });
  mevcutSoru = 0;
  puan = 0;
  dogruSayisi = 0;
  yanlisSayisi = 0;
  streak = 0;
  yanlislar = [];
  document.getElementById('quiz-bolum-title').textContent = 'Bölüm ' + bolum.no;
  document.getElementById('q-total').textContent = sorular.length;
  document.getElementById('q-score').textContent = '0';
  document.getElementById('yanlis-listesi').style.display = 'none';
  ekranGoster('quiz-ekrani');
  soruGoster();
}

// ===== SORU GÖSTER =====
function soruGoster() {
  cevaplandiMi = false;
  const s = sorular[mevcutSoru];
  const harfler = ['A', 'B', 'C', 'D'];
  document.getElementById('q-current').textContent = mevcutSoru + 1;
  const yuzde = ((mevcutSoru) / sorular.length * 100).toFixed(0);
  document.getElementById('quiz-progress-fill').style.width = yuzde + '%';
  document.getElementById('next-btn').style.display = 'none';

  const area = document.getElementById('question-area');
  area.innerHTML = `
    <div class="question-card">
      <div class="q-number">SORU ${mevcutSoru + 1} / ${sorular.length}</div>
      <div class="q-text">${s.question}</div>
      <div class="options-list" id="options-list">
        ${s.options.map((opt, i) => `
          <button class="option-btn" onclick="cevapSec(${i})" id="opt-${i}">
            <span class="opt-letter">${harfler[i]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div id="explanation-area"></div>
    </div>
  `;
}

// ===== CEVAP SEÇ =====
function cevapSec(secim) {
  if (cevaplandiMi) return;
  cevaplandiMi = true;

  const s = sorular[mevcutSoru];
  const dogruMu = secim === s.correct;

  // Tüm butonları devre dışı bırak
  document.querySelectorAll('.option-btn').forEach(btn => btn.classList.add('disabled'));

  // Doğru cevabı yeşil yap
  document.getElementById('opt-' + s.correct).classList.add('correct');

  if (dogruMu) {
    puan += 10;
    dogruSayisi++;
    streak++;
    maxStreakKaydet(streak);
    // Streak kontrolü
    if (streak > 0 && streak % 5 === 0) {
      streakGoster(streak);
    }
  } else {
    document.getElementById('opt-' + secim).classList.add('wrong');
    yanlisSayisi++;
    streak = 0;
    yanlislar.push({
      soru: s.question,
      secilen: s.options[secim],
      dogru: s.options[s.correct],
      aciklama: s.explanation || ''
    });
  }

  document.getElementById('q-score').textContent = puan;

  // Açıklama göster
  if (s.explanation) {
    document.getElementById('explanation-area').innerHTML = `
      <div class="explanation-box">
        <strong>💡 Açıklama:</strong> ${s.explanation}
      </div>
    `;
  }

  // Sonraki buton
  document.getElementById('next-btn').style.display = 'block';
  document.getElementById('next-btn').textContent =
    mevcutSoru < sorular.length - 1 ? 'Sonraki Soru →' : 'Sonuçları Gör →';
}

// ===== SONRAKİ SORU =====
function sonrakiSoru() {
  mevcutSoru++;
  if (mevcutSoru >= sorular.length) {
    sonucGoster();
  } else {
    soruGoster();
  }
}

// ===== SONUÇ GÖSTER =====
function sonucGoster() {
  const yuzde = Math.round((dogruSayisi / sorular.length) * 100);
  bolumKaydet(aktifBolum.id, puan, yuzde);

  let badge, title;
  if (yuzde >= 95) { badge = '🥇'; title = 'Mükemmel!'; }
  else if (yuzde >= 80) { badge = '🥈'; title = 'Çok İyi!'; }
  else if (yuzde >= 60) { badge = '🥉'; title = 'İyi!'; }
  else if (yuzde >= 40) { badge = '📖'; title = 'Çalışmaya Devam'; }
  else { badge = '💪'; title = 'Tekrar Gerekli'; }

  document.getElementById('result-badge').textContent = badge;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = aktifBolum.title;
  document.getElementById('res-dogru').textContent = dogruSayisi;
  document.getElementById('res-yanlis').textContent = yanlisSayisi;
  document.getElementById('res-puan').textContent = puan;
  document.getElementById('res-yuzde').textContent = '%' + yuzde;

  document.getElementById('quiz-progress-fill').style.width = '100%';
  ekranGoster('sonuc-ekrani');
}

// ===== YANLIŞLARI GÖR =====
function yanlislariGor() {
  const container = document.getElementById('yanlis-listesi');
  if (yanlislar.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:var(--accent3);padding:20px;">🎉 Hiç yanlışınız yok!</p>';
  } else {
    container.innerHTML = yanlislar.map(y => `
      <div class="yanlis-card">
        <div class="yq-text">${y.soru}</div>
        <div class="yq-wrong">✘ Seçtiğiniz: ${y.secilen}</div>
        <div class="yq-correct">✔ Doğru cevap: ${y.dogru}</div>
        ${y.aciklama ? `<div class="yq-explain">💡 ${y.aciklama}</div>` : ''}
      </div>
    `).join('');
  }
  container.style.display = 'block';
  container.scrollIntoView({ behavior: 'smooth' });
}

// ===== TEKRAR DENE =====
function tekrarDene() {
  document.getElementById('yanlis-listesi').style.display = 'none';
  bolumBaslat(aktifBolum);
}

// ===== GERİ DÖN =====
function geriDon() {
  document.getElementById('yanlis-listesi').style.display = 'none';
  ekranGoster('bolum-secim');
  bolumKartlariniOlustur();
}

// ===== STREAK POPUP =====
function streakGoster(sayi) {
  const popup = document.getElementById('streak-popup');
  document.getElementById('streak-text').textContent = sayi + ' Art Arda! 🔥';
  popup.classList.add('show');
  setTimeout(() => popup.classList.remove('show'), 1500);
}

// ===== BAŞLAT =====
bolumKartlariniOlustur();
</script>
