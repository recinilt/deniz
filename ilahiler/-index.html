<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vahdet İlâhîleri</title>
<meta name="description" content="Arkadaş meclisinde birlikte ilahi söylemek için sade, sunum modlu ilahi defteri.">
<style>
  :root{
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --lyric:1.35rem;      /* okuyucu söz boyutu (font −/+ ile değişir) */
    --stage:clamp(1.9rem,5.2vw,3.4rem); /* sunum modu söz boyutu */
  }
  html[data-theme="dark"]{
    --bg:#14151c; --panel:#1b1d27; --panel2:#22242f; --raise:#262837;
    --text:#ece8df; --dim:#9c998f; --faint:#6f6d66;
    --gold:#d3ad33; --gold-ink:#d3ad33; --gold-soft:rgba(211,173,51,.14);
    --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.16);
    --focus:#e7c44d;
  }
  html[data-theme="light"]{
    --bg:#f6f1e6; --panel:#fbf8f0; --panel2:#efe7d6; --raise:#fffdf8;
    --text:#23201a; --dim:#6b6657; --faint:#9a937f;
    --gold:#9a7b14; --gold-ink:#7d6310; --gold-soft:rgba(154,123,20,.12);
    --line:rgba(40,33,10,.12); --line-strong:rgba(40,33,10,.22);
    --focus:#9a7b14;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); font-size:16px; line-height:1.6;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; min-height:100dvh;
  }
  button,input{font-family:inherit; color:inherit}
  :focus-visible{outline:2px solid var(--focus); outline-offset:2px; border-radius:6px}

  /* ---------- üst bar ---------- */
  .topbar{
    display:flex; align-items:center; gap:14px;
    padding:11px 16px; border-bottom:1px solid var(--line);
    background:var(--panel); position:sticky; top:0; z-index:30;
  }
  .brand{display:flex; align-items:center; gap:11px; font-family:var(--serif);
    font-size:1.28rem; letter-spacing:.01em; white-space:nowrap}
  .brand .mark{width:11px; height:11px; background:var(--gold); transform:rotate(45deg);
    flex:0 0 auto; box-shadow:0 0 0 4px var(--gold-soft)}
  .brand b{font-weight:500}
  .menu-btn{display:none}
  .grow{flex:1 1 auto}
  .search{display:flex; align-items:center; gap:8px; background:var(--panel2);
    border:1px solid var(--line); border-radius:9px; padding:7px 11px; min-width:0; flex:0 1 260px}
  .search svg{flex:0 0 auto; color:var(--dim)}
  .search input{border:0; background:transparent; outline:0; width:100%; font-size:.95rem}
  .search input::placeholder{color:var(--faint)}
  .controls{display:flex; align-items:center; gap:6px; flex:0 0 auto}
  .ic{display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px;
    background:transparent; border:1px solid var(--line); border-radius:9px; cursor:pointer;
    color:var(--text); transition:background .15s,border-color .15s}
  .ic:hover{background:var(--panel2); border-color:var(--line-strong)}
  .ic.on{background:var(--gold-soft); border-color:var(--gold); color:var(--gold-ink)}
  .ic svg{width:19px; height:19px}

  /* ---------- gövde ---------- */
  .layout{flex:1 1 auto; display:flex; min-height:0}
  .sidebar{flex:0 0 288px; border-right:1px solid var(--line); background:var(--panel);
    display:flex; flex-direction:column; min-height:0}
  .chips{display:flex; gap:7px; flex-wrap:wrap; padding:13px 14px 10px}
  .chip{font-size:.8rem; padding:5px 12px; border:1px solid var(--line); border-radius:999px;
    background:transparent; color:var(--dim); cursor:pointer; white-space:nowrap; transition:all .15s}
  .chip:hover{border-color:var(--line-strong); color:var(--text)}
  .chip.on{background:var(--gold-soft); border-color:var(--gold); color:var(--gold-ink)}
  .list{overflow:auto; padding:4px 10px 16px; -webkit-overflow-scrolling:touch}
  .row{display:block; width:100%; text-align:right; padding:9px 11px; border:0; background:transparent;
    border-radius:9px; cursor:pointer; margin:2px 0; color:var(--text)}
  .row .t{display:flex; justify-content:space-between; gap:10px; align-items:baseline}
  .row .no{color:var(--faint); font-size:.78rem; font-variant-numeric:tabular-nums; flex:0 0 auto}
  .row .ti{font-family:var(--serif); font-size:1.02rem; line-height:1.3}
  .row .s{color:var(--dim); font-size:.8rem; margin-top:1px}
  .row:hover{background:var(--panel2)}
  .row.on{background:var(--gold-soft)}
  .row.on .ti{color:var(--gold-ink)}
  .row .t,.row .s{flex-direction:row}
  .list .row{text-align:left}

  /* ---------- okuyucu ---------- */
  .reader{flex:1 1 auto; overflow:auto; min-width:0; -webkit-overflow-scrolling:touch}
  .reader-inner{max-width:760px; margin:0 auto; padding:38px 28px 120px}
  .rhead{border-bottom:1px solid var(--line); padding-bottom:20px; margin-bottom:30px}
  .title{font-family:var(--serif); font-weight:500; font-size:clamp(1.9rem,4vw,2.6rem);
    line-height:1.18; margin:0}
  .meta{color:var(--dim); margin-top:9px; font-size:.95rem}
  .meta .dot{color:var(--gold); margin:0 8px; opacity:.7}
  .ref{margin-top:16px}
  .ref a{display:inline-flex; align-items:center; gap:8px; text-decoration:none;
    border:1px solid var(--line-strong); border-radius:9px; padding:8px 14px; font-size:.9rem; color:var(--text)}
  .ref a:hover{background:var(--panel2); border-color:var(--gold)}
  .ref a svg{width:17px; height:17px; color:var(--gold-ink)}

  .lyrics{font-family:var(--serif); font-size:var(--lyric); line-height:1.95}
  .nakarat{position:relative; padding:14px 0 14px 20px; margin:0 0 26px;
    border-left:3px solid var(--gold); background:var(--gold-soft); border-radius:0 9px 9px 0}
  .nakarat .lbl{font-family:var(--sans); font-size:.7rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gold-ink); padding-right:16px; margin-bottom:7px}
  .nakarat .ln{font-style:italic}
  .kita{margin:0 0 26px}
  .ln{display:block}
  .ln.blank{height:.7em}

  /* ---------- alt bar ---------- */
  .bottombar{position:sticky; bottom:0; z-index:20; display:flex; align-items:center; gap:18px;
    padding:10px 16px; border-top:1px solid var(--line); background:var(--panel); flex-wrap:wrap}
  .nav{display:flex; align-items:center; gap:9px}
  .idx{color:var(--dim); font-size:.85rem; font-variant-numeric:tabular-nums; min-width:54px; text-align:center}
  .scroller{display:flex; align-items:center; gap:10px; flex:1 1 220px; min-width:170px; color:var(--dim); font-size:.85rem}
  .scroller input[type=range]{flex:1 1 auto; accent-color:var(--gold); min-width:90px}
  .scroller .val{min-width:46px; text-align:right; font-variant-numeric:tabular-nums}
  .bspace{flex:1 1 auto}

  /* ---------- sunum modu ---------- */
  #stage{position:fixed; inset:0; z-index:100; background:var(--bg); display:none;
    overflow:auto; padding:7vh 6vw; -webkit-overflow-scrolling:touch}
  body.present #stage{display:block}
  body.present{overflow:hidden}
  .stage-in{max-width:1100px; margin:0 auto; text-align:center}
  .stage-title{font-family:var(--serif); color:var(--gold-ink); font-weight:500;
    font-size:clamp(1.5rem,3.4vw,2.4rem); margin:0 0 6px}
  .stage-sub{color:var(--dim); font-size:1rem; margin-bottom:8vh}
  .stage-lyrics{font-family:var(--serif); font-size:var(--stage); line-height:1.7}
  .stage-lyrics .nakarat{display:inline-block; text-align:center; border:0; background:transparent;
    padding:0; margin:0 0 1.1em; color:var(--gold-ink)}
  .stage-lyrics .nakarat .lbl{display:none}
  .stage-lyrics .nakarat .ln{font-style:italic}
  .stage-lyrics .kita{margin:0 0 1.1em}
  .stage-exit{position:fixed; top:18px; right:18px; z-index:101}
  .stage-hint{position:fixed; bottom:16px; left:0; right:0; text-align:center; color:var(--faint);
    font-size:.8rem; font-family:var(--sans); pointer-events:none}

  /* ---------- boş / hata ---------- */
  .state{max-width:560px; margin:14vh auto; text-align:center; padding:0 24px; color:var(--dim)}
  .state h2{font-family:var(--serif); color:var(--text); font-weight:500}
  .state code{background:var(--panel2); padding:2px 7px; border-radius:6px; font-size:.9em}

  .backdrop{display:none}

  /* ---------- mobil ---------- */
  @media (max-width:820px){
    .menu-btn{display:inline-flex}
    .brand{font-size:1.12rem}
    .search{flex-basis:auto; order:5; width:100%}
    .topbar{flex-wrap:wrap}
    .sidebar{position:fixed; top:0; bottom:0; left:0; width:84%; max-width:340px; z-index:60;
      transform:translateX(-102%); transition:transform .22s ease; border-right:1px solid var(--line-strong)}
    body.nav-open .sidebar{transform:none}
    .backdrop{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50}
    body.nav-open .backdrop{display:block}
    .reader-inner{padding:26px 18px 130px}
  }

  @media (prefers-reduced-motion:reduce){ *{transition:none!important} }

  /* ---------- yazdırma ---------- */
  @media print{
    .topbar,.sidebar,.bottombar,.backdrop,#stage,.ref{display:none!important}
    body{background:#fff; color:#000; display:block}
    .reader{overflow:visible}
    .reader-inner{max-width:none; padding:0}
    .lyrics,.title{color:#000}
    .nakarat{background:transparent; border-left:3px solid #000}
    .nakarat .lbl{color:#000}
  }
</style>
</head>
<body>

<header class="topbar">
  <button class="ic menu-btn" id="menuBtn" aria-label="Listeyi aç">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <div class="brand"><span class="mark" aria-hidden="true"></span><b>Vahdet</b>&nbsp;İlâhîleri</div>
  <div class="grow"></div>
  <label class="search">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="search" type="search" placeholder="Başlık · şair · söz ara…" autocomplete="off" aria-label="İlahi ara">
  </label>
  <div class="controls">
    <button class="ic" id="fontDown" aria-label="Yazıyı küçült" title="Küçült">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
    </button>
    <button class="ic" id="fontUp" aria-label="Yazıyı büyült" title="Büyült">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="ic" id="themeBtn" aria-label="Tema değiştir" title="Tema">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
    </button>
    <button class="ic" id="wakeBtn" aria-label="Ekranı açık tut" title="Ekranı açık tut">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.6.6 1 1.4 1 2.2V16h6v-.3c0-.8.4-1.6 1-2.2A6 6 0 0 0 12 3z"/></svg>
    </button>
    <button class="ic" id="presentBtn" aria-label="Sunum modu" title="Sunum modu (F)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="chips" id="chips"></div>
    <nav class="list" id="list" aria-label="İlahi listesi"></nav>
  </aside>
  <main class="reader" id="reader">
    <div class="reader-inner" id="readerInner">
      <div class="state"><h2>Yükleniyor…</h2></div>
    </div>
  </main>
</div>

<footer class="bottombar">
  <div class="nav">
    <button class="ic" id="prevBtn" aria-label="Önceki ilahi" title="Önceki (←)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6"/></svg>
    </button>
    <span class="idx" id="idx">– / –</span>
    <button class="ic" id="nextBtn" aria-label="Sonraki ilahi" title="Sonraki (→)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
    </button>
  </div>
  <div class="scroller">
    <span>Oto-kaydırma</span>
    <input id="autoRange" type="range" min="0" max="10" step="1" value="0" aria-label="Oto-kaydırma hızı">
    <span class="val" id="autoVal">kapalı</span>
  </div>
  <button class="ic" id="printBtn" aria-label="Yazdır" title="Yazdır">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-2M6 14h12v7H6z"/></svg>
  </button>
</footer>

<section id="stage" aria-hidden="true">
  <div class="stage-in">
    <h2 class="stage-title" id="stageTitle"></h2>
    <div class="stage-sub" id="stageSub"></div>
    <div class="stage-lyrics" id="stageLyrics"></div>
  </div>
  <button class="ic stage-exit" id="stageExit" aria-label="Sunumdan çık" title="Çık (Esc)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
  <div class="stage-hint">Boşluk: kaydır · ← → : geçiş · Esc: çık</div>
</section>

<div class="backdrop" id="backdrop"></div>

<script>
"use strict";
const $ = (s)=>document.querySelector(s);
const el = (t,c)=>{const e=document.createElement(t); if(c) e.className=c; return e;};

const state = {
  all: [], view: [], idx: 0, q: "", tema: null,
  fontStep: 0, auto: 0, present: false, wake: null, wakeWanted: false,
};
const FONT_BASE = 1.35, FONT_MIN = 1.0, FONT_MAX = 2.4, FONT_INC = 0.12;

/* ---- ayarlar (cihazda saklanır) ---- */
function load(k,d){ try{const v=localStorage.getItem(k); return v===null?d:v;}catch(e){return d;} }
function save(k,v){ try{localStorage.setItem(k,v);}catch(e){} }

/* ---- veri yükleme ---- */
async function init(){
  applySettings();
  try{
    const res = await fetch("ilahiler.json", {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    const list = Array.isArray(data) ? data : (data.ilahiler || []);
    state.all = list.filter(x=>x && x.baslik);
    if(!state.all.length) return showError("empty");
    buildChips();
    refilter(true);
  }catch(err){
    showError("load", err);
  }
}

function showError(kind, err){
  const box = el("div","state");
  if(kind==="load"){
    box.innerHTML = "<h2>İlahiler yüklenemedi</h2>" +
      "<p>Bu sayfa dosyaya çift tıklanarak (<code>file://</code>) değil, bir sunucu üzerinden açılmalı: " +
      "VS Code <b>Live Server</b>, GitHub Pages veya kendi hostingin.</p>" +
      "<p>Ayrıca <code>ilahiler.json</code> dosyasının <code>index.html</code> ile aynı klasörde olduğundan emin ol.</p>";
  }else{
    box.innerHTML = "<h2>Liste boş</h2><p><code>ilahiler.json</code> içine en az bir ilahi ekle.</p>";
  }
  $("#readerInner").replaceChildren(box);
  $("#idx").textContent = "– / –";
}

/* ---- temalar (kategori) çipleri ---- */
function buildChips(){
  const set = new Set();
  state.all.forEach(i=> (i.tema||[]).forEach(t=> set.has(t)||set.add(t)));
  const wrap = $("#chips"); wrap.replaceChildren();
  const mk = (label,val)=>{
    const c = el("button","chip"); c.textContent = label; c.dataset.v = val??"";
    if((state.tema||"")===(val||"")) c.classList.add("on");
    c.onclick = ()=>{ state.tema = (state.tema===val)?null:val; buildChips(); refilter(true); };
    return c;
  };
  wrap.appendChild(mk("Tümü", null));
  [...set].sort((a,b)=>a.localeCompare(b,"tr")).forEach(t=> wrap.appendChild(mk(t,t)));
}

/* ---- arama + filtre ---- */
function matches(i){
  if(state.tema && !(i.tema||[]).includes(state.tema)) return false;
  const q = state.q.trim().toLocaleLowerCase("tr");
  if(!q) return true;
  const hay = [i.baslik, i.sair, i.makam,
    ...(i.nakarat||[]),
    ...((i.kitalar||[]).flat())].join(" ").toLocaleLowerCase("tr");
  return hay.includes(q);
}
function refilter(reset){
  const prevId = state.view[state.idx] && state.view[state.idx].id;
  state.view = state.all.filter(matches);
  let ni = state.view.findIndex(x=>x.id===prevId);
  state.idx = reset ? (ni>=0?ni:0) : Math.max(0, Math.min(state.idx, state.view.length-1));
  if(state.idx<0) state.idx = 0;
  renderList();
  renderReader();
}

/* ---- sol liste ---- */
function renderList(){
  const list = $("#list"); list.replaceChildren();
  if(!state.view.length){
    const e = el("div","row"); e.style.color="var(--faint)"; e.style.cursor="default";
    e.textContent = "Sonuç yok"; list.appendChild(e); return;
  }
  state.view.forEach((i,n)=>{
    const b = el("button","row"); if(n===state.idx) b.classList.add("on");
    const t = el("div","t");
    const ti = el("span","ti"); ti.textContent = i.baslik;
    const no = el("span","no"); no.textContent = String(n+1).padStart(2,"0");
    t.append(no, ti);
    const s = el("div","s"); s.textContent = i.sair || "";
    b.append(t, s);
    b.onclick = ()=>{ select(n); if(window.innerWidth<=820) closeNav(); };
    list.appendChild(b);
  });
}

/* ---- söz bloğu üretimi ---- */
function lyricsNode(i, big){
  const frag = document.createDocumentFragment();
  const addLines = (arr, parent)=>{
    (arr||[]).forEach(line=>{
      if(line===""){ const sp=el("span","ln blank"); parent.appendChild(sp); }
      else{ const sp=el("span","ln"); sp.textContent=line; parent.appendChild(sp); }
    });
  };
  if(i.nakarat && i.nakarat.length){
    const nk = el("div","nakarat");
    if(!big){ const lbl=el("div","lbl"); lbl.textContent="Nakarat"; nk.appendChild(lbl); }
    addLines(i.nakarat, nk);
    frag.appendChild(nk);
  }
  (i.kitalar||[]).forEach(k=>{
    const kt = el("div","kita"); addLines(k, kt); frag.appendChild(kt);
  });
  return frag;
}

/* ---- okuyucu ---- */
function renderReader(){
  const i = state.view[state.idx];
  $("#idx").textContent = state.view.length ? (state.idx+1)+" / "+state.view.length : "– / –";
  if(!i){ return; }
  const inner = $("#readerInner"); inner.replaceChildren();

  const head = el("div","rhead");
  const h1 = el("h1","title"); h1.textContent = i.baslik; head.appendChild(h1);
  const meta = el("div","meta");
  const parts = [];
  if(i.sair) parts.push(i.sair);
  if(i.makam) parts.push(i.makam + " makamı");
  if(i.tema && i.tema.length) parts.push(i.tema.join(", "));
  parts.forEach((p,n)=>{
    if(n){ const d=el("span","dot"); d.textContent="◆"; meta.appendChild(d); }
    meta.appendChild(document.createTextNode(p));
  });
  head.appendChild(meta);
  if(i.referans){
    const ref = el("div","ref");
    const a = el("a"); a.href = i.referans; a.target="_blank"; a.rel="noopener";
    a.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 5v14l11-7z"/></svg>';
    a.appendChild(document.createTextNode("Referans kayıt"));
    ref.appendChild(a); head.appendChild(ref);
  }
  inner.appendChild(head);

  const ly = el("div","lyrics"); ly.appendChild(lyricsNode(i,false));
  inner.appendChild(ly);

  $("#reader").scrollTop = 0;
  if(state.present) renderStage();
}

function select(n){
  state.idx = Math.max(0, Math.min(n, state.view.length-1));
  renderList(); renderReader();
  const cur = $("#list .row.on"); if(cur) cur.scrollIntoView({block:"nearest"});
}
function step(d){ if(!state.view.length) return; select((state.idx + d + state.view.length) % state.view.length); }

/* ---- sunum modu ---- */
function renderStage(){
  const i = state.view[state.idx]; if(!i) return;
  $("#stageTitle").textContent = i.baslik;
  const sub = [i.sair, i.makam && (i.makam+" makamı")].filter(Boolean).join("  ◆  ");
  $("#stageSub").textContent = sub;
  const sl = $("#stageLyrics"); sl.replaceChildren(); sl.appendChild(lyricsNode(i,true));
  $("#stage").scrollTop = 0;
}
function setPresent(on){
  state.present = on;
  document.body.classList.toggle("present", on);
  $("#stage").setAttribute("aria-hidden", on?"false":"true");
  $("#presentBtn").classList.toggle("on", on);
  if(on){
    renderStage();
    const r = document.documentElement;
    if(r.requestFullscreen) r.requestFullscreen().catch(()=>{});
  }else{
    if(document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(()=>{});
  }
}
document.addEventListener("fullscreenchange", ()=>{
  if(!document.fullscreenElement && state.present) setPresent(false);
});

/* ---- oto-kaydırma ---- */
let autoRAF = null, autoAcc = 0;
function autoTick(){
  if(state.auto>0){
    autoAcc += state.auto * 0.45;            // hız
    const px = Math.floor(autoAcc);
    if(px>=1){
      autoAcc -= px;
      const box = state.present ? $("#stage") : $("#reader");
      box.scrollTop += px;
    }
  }
  autoRAF = requestAnimationFrame(autoTick);
}
function setAuto(v){
  state.auto = +v;
  $("#autoVal").textContent = state.auto ? ("hız "+state.auto) : "kapalı";
  $("#autoRange").value = state.auto;
  if(state.auto>0 && !autoRAF) autoRAF = requestAnimationFrame(autoTick);
  if(state.auto===0 && autoRAF){ cancelAnimationFrame(autoRAF); autoRAF=null; autoAcc=0; }
}

/* ---- yazı boyutu / tema ---- */
function applyFont(){
  const size = Math.min(FONT_MAX, Math.max(FONT_MIN, FONT_BASE + state.fontStep*FONT_INC));
  document.documentElement.style.setProperty("--lyric", size.toFixed(2)+"rem");
  save("vi_font", state.fontStep);
}
function setTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  $("#themeBtn").setAttribute("aria-pressed", t==="light");
  save("vi_theme", t);
}

/* ---- wake lock (ekranı açık tut) ---- */
const wakeSupported = ("wakeLock" in navigator);
async function requestWake(){
  if(!wakeSupported) return;
  try{
    state.wake = await navigator.wakeLock.request("screen");
    state.wake.addEventListener("release", ()=>{ state.wake=null; });
  }catch(e){ state.wake=null; }
}
async function toggleWake(){
  if(!wakeSupported){
    $("#wakeBtn").title = "Bu tarayıcı ekranı açık tutmayı desteklemiyor";
    return;
  }
  state.wakeWanted = !state.wakeWanted;
  $("#wakeBtn").classList.toggle("on", state.wakeWanted);
  if(state.wakeWanted) await requestWake();
  else if(state.wake){ try{await state.wake.release();}catch(e){} state.wake=null; }
}
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState==="visible" && state.wakeWanted && !state.wake) requestWake();
});

/* ---- mobil menü ---- */
function openNav(){ document.body.classList.add("nav-open"); }
function closeNav(){ document.body.classList.remove("nav-open"); }

/* ---- ilk ayarlar ---- */
function applySettings(){
  setTheme(load("vi_theme","dark"));
  state.fontStep = parseInt(load("vi_font","0"),10) || 0; applyFont();
  if(!wakeSupported){ $("#wakeBtn").style.opacity=".45"; }
}

/* ---- olaylar ---- */
$("#search").addEventListener("input", e=>{ state.q=e.target.value; refilter(true); });
$("#fontUp").onclick = ()=>{ state.fontStep++; applyFont(); };
$("#fontDown").onclick = ()=>{ state.fontStep--; applyFont(); };
$("#themeBtn").onclick = ()=> setTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
$("#presentBtn").onclick = ()=> setPresent(!state.present);
$("#stageExit").onclick = ()=> setPresent(false);
$("#wakeBtn").onclick = toggleWake;
$("#prevBtn").onclick = ()=> step(-1);
$("#nextBtn").onclick = ()=> step(1);
$("#autoRange").addEventListener("input", e=> setAuto(e.target.value));
$("#printBtn").onclick = ()=> window.print();
$("#menuBtn").onclick = openNav;
$("#backdrop").onclick = closeNav;

document.addEventListener("keydown", e=>{
  if(e.target.matches("input")) {
    if(e.key==="Escape") e.target.blur();
    return;
  }
  switch(e.key){
    case "ArrowLeft": step(-1); break;
    case "ArrowRight": step(1); break;
    case "f": case "F": setPresent(!state.present); break;
    case "Escape": if(state.present) setPresent(false); else closeNav(); break;
    case "+": case "=": state.fontStep++; applyFont(); break;
    case "-": case "_": state.fontStep--; applyFont(); break;
    case " ":
      e.preventDefault();
      (state.present?$("#stage"):$("#reader")).scrollBy({top: (innerHeight*0.8), behavior:"smooth"});
      break;
    case "/": e.preventDefault(); $("#search").focus(); break;
  }
});

init();
</script>
</body>
</html>
