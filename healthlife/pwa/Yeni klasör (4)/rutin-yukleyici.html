window.girisYap = async function(){
    log('🔐 Google girişi başlatılıyor...','bilgi');
    try{
        var result = await signInWithPopup(auth, new GoogleAuthProvider());
        if(result.user.email !== ADMIN_EMAIL){
            log('❌ Bu hesap yönetici değil: '+result.user.email,'hata');
            return;
        }
        log('✅ Yönetici girişi başarılı: '+result.user.email,'ok');
        document.getElementById('btn-giris').style.display='none';
        document.getElementById('btn-yukle').style.display='';
        document.getElementById('btn-sil').style.display='';
    }catch(e){
        log('❌ Giriş hatası: '+e.message,'hata');
    }
};

window.rutinleriYukle = async function(){
    log('\n🚀 7 rutin yükleniyor...','bilgi');
    try{
        var snap = await get(ref(db, 'admin'));
        var adminData = snap.exists() ? snap.val() : {};
        if(!adminData.sabitRutinler) adminData.sabitRutinler = [];

        var eklenen = 0;
        RUTINLER.forEach(function(r){
            // Aynı isimde varsa ekleme
            var var_mi = adminData.sabitRutinler.some(function(m){ return m.ad === r.ad; });
            if(var_mi){
                log('⏭️ Zaten var, atlandı: '+r.ad,'bilgi');
            } else {
                adminData.sabitRutinler.push(r);
                eklenen++;
                log('✅ Eklendi: '+r.ad+' ('+r.adimlar.length+' adım)','ok');
            }
        });

        await set(ref(db, 'admin'), adminData);
        log('\n🎉 Tamamlandı! '+eklenen+' yeni rutin eklendi. Toplam: '+adminData.sabitRutinler.length,'ok');
    }catch(e){
        log('❌ Hata: '+e.message,'hata');
    }
};

window.rutinleriSil = async function(){
    if(!confirm('TÜM sabit rutinleri silmek istediğinize emin misiniz?')) return;
    try{
        var snap = await get(ref(db, 'admin'));
        var adminData = snap.exists() ? snap.val() : {};
        var eski = (adminData.sabitRutinler||[]).length;
        adminData.sabitRutinler = [];
        await set(ref(db, 'admin'), adminData);
        log('🗑️ '+eski+' rutin silindi. Sabit rutinler temizlendi.','hata');
    }catch(e){
        log('❌ Hata: '+e.message,'hata');
    }
};
