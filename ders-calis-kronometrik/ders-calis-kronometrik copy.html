<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Ders Çalışma Takip</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --bg-card-hover: #1f2b3d;
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.15);
            --accent-dim: #0e7490;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --danger: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --break-color: #a78bfa;
            --border: #1e293b;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .app-header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .app-header h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.8em;
            color: var(--accent);
            letter-spacing: -1px;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        .app-header p {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 5px;
        }

        /* Ekranlar */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ders Listesi */
        .ders-ekle-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .ders-ekle-bar input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .ders-ekle-bar input:focus {
            border-color: var(--accent);
        }

        .ders-ekle-bar input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-accent {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-accent:hover {
            background: #06b6d4;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #e11d48;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-warning {
            background: var(--warning);
            color: var(--bg-primary);
        }

        .btn-sm {
            padding: 8px 14px;
            font-size: 13px;
        }

        .ders-listesi {
            display: grid;
            gap: 10px;
        }

        .ders-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ders-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-dim);
            transform: translateX(4px);
        }

        .ders-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ders-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .ders-item-name {
            font-weight: 700;
            font-size: 16px;
        }

        .ders-item-stats {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 2px;
        }

        .ders-item-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ders-sil-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 16px;
        }

        .ders-sil-btn:hover {
            color: var(--danger);
            background: rgba(244, 63, 94, 0.1);
        }

        .ders-arrow {
            color: var(--text-muted);
            font-size: 20px;
        }

        /* Takvim Ekranı */
        .takvim-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .takvim-header h2 {
            font-family: 'Space Mono', monospace;
            font-size: 1.3em;
            color: var(--accent);
        }

        .takvim-nav {
            display: flex;
            gap: 8px;
        }

        .takvim-nav button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .takvim-nav button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .takvim-ders-adi {
            font-size: 1em;
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .takvim-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .takvim-gun-adi {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            padding: 8px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .takvim-gun {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 6px;
            min-height: 80px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .takvim-gun:hover {
            border-color: var(--accent-dim);
            background: var(--bg-card-hover);
        }

        .takvim-gun.bos {
            background: transparent;
            border-color: transparent;
            cursor: default;
        }

        .takvim-gun.bugun {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .takvim-gun-num {
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .takvim-gun.bugun .takvim-gun-num {
            color: var(--accent);
        }

        .takvim-gun-data {
            font-size: 10px;
            line-height: 1.4;
        }

        .takvim-gun-data .calisma {
            color: var(--success);
        }

        .takvim-gun-data .mola {
            color: var(--break-color);
        }

        /* Kronometre Ekranı */
        .kronometre-screen {
            text-align: center;
        }

        .kronometre-bilgi {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .kronometre-bilgi span {
            color: var(--accent);
            font-weight: 700;
        }

        .kronometre-display {
            font-family: 'Space Mono', monospace;
            font-size: 4em;
            color: var(--text-primary);
            padding: 30px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 40px rgba(255,255,255,0.05);
        }

        .kronometre-display.calisiyor {
            color: var(--success);
            text-shadow: 0 0 40px rgba(16, 185, 129, 0.2);
        }

        .kronometre-display.molada {
            color: var(--break-color);
            text-shadow: 0 0 40px rgba(167, 139, 250, 0.2);
        }

        .kronometre-label {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            min-height: 20px;
        }

        .kronometre-label.calisma-label {
            color: var(--success);
        }

        .kronometre-label.mola-label {
            color: var(--break-color);
        }

        .mola-display {
            font-family: 'Space Mono', monospace;
            font-size: 1.5em;
            color: var(--break-color);
            margin-bottom: 10px;
            min-height: 30px;
        }

        .kronometre-butonlar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .kronometre-butonlar .btn {
            min-width: 120px;
            justify-content: center;
            padding: 14px 28px;
            font-size: 15px;
        }

        /* İstatistik Paneli */
        .istatistik-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 25px;
        }

        .istatistik-panel h3 {
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .istatistik-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .istatistik-item {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .istatistik-item .value {
            font-family: 'Space Mono', monospace;
            font-size: 1.4em;
            font-weight: 700;
            display: block;
        }

        .istatistik-item .label {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 4px;
        }

        .istatistik-item.calisma .value { color: var(--success); }
        .istatistik-item.mola .value { color: var(--break-color); }
        .istatistik-item.oturum .value { color: var(--warning); }

        /* Kaydet Bar */
        .kaydet-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* Breadcrumb Nav */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb-item:hover {
            color: var(--accent);
        }

        .breadcrumb-sep {
            color: var(--text-muted);
            font-size: 12px;
        }

        .breadcrumb-item.aktif {
            color: var(--text-primary);
            font-weight: 700;
            cursor: default;
        }

        /* Notification */
        .bildirim {
            position: fixed;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 700;
            z-index: 9999;
            transition: top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        .bildirim.show {
            top: 20px;
        }

        /* Boş durum */
        .bos-durum {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .bos-durum-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* Günün oturumları */
        .oturum-listesi {
            margin-top: 15px;
        }

        .oturum-item {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .oturum-item .saat {
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }

        .oturum-item .sure {
            font-weight: 700;
        }

        .oturum-item .sure.c { color: var(--success); }
        .oturum-item .sure.m { color: var(--break-color); }

        /* Responsive */
        @media (max-width: 600px) {
            .app-container { padding: 12px; }
            .app-header h1 { font-size: 1.4em; }
            .kronometre-display { font-size: 2.8em; }
            .takvim-gun { min-height: 60px; padding: 6px 4px; }
            .takvim-gun-num { font-size: 12px; }
            .takvim-gun-data { font-size: 9px; }
            .kronometre-butonlar .btn { min-width: 100px; padding: 12px 20px; font-size: 14px; }
        }

        /* Gün detay modal */
        .gun-detay-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .gun-detay-overlay.active {
            display: flex;
        }

        .gun-detay-modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .gun-detay-modal h3 {
            font-family: 'Space Mono', monospace;
            color: var(--accent);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="bildirim" id="bildirim"></div>

    <div class="app-container">
        <div class="app-header">
            <h1>📚 Ders Çalışma Takip</h1>
            <p id="headerAltBilgi">Derslerini ekle, zamanını takip et</p>
        </div>

        <!-- EKRAN 1: Ders Listesi -->
        <div class="screen active" id="ekranDersler">
            <div class="ders-ekle-bar">
                <input type="text" id="yeniDersInput" placeholder="Yeni ders adı..." maxlength="50">
                <button class="btn btn-accent" onclick="dersEkle()">+ Ekle</button>
            </div>
            <div class="ders-listesi" id="dersListesi"></div>
            <div class="kaydet-bar" style="margin-top:20px;">
                <button class="btn btn-success btn-sm" onclick="githubKaydet()">💾 GitHub'a Kaydet</button>
                <button class="btn btn-ghost btn-sm" onclick="githubYukle()">📥 GitHub'dan Yükle</button>
            </div>
        </div>

        <!-- EKRAN 2: Takvim -->
        <div class="screen" id="ekranTakvim">
            <div class="breadcrumb">
                <span class="breadcrumb-item" onclick="ekranGoster('ekranDersler')">Dersler</span>
                <span class="breadcrumb-sep">›</span>
                <span class="breadcrumb-item aktif" id="breadcrumbDers"></span>
            </div>
            <div class="takvim-header">
                <div class="takvim-nav">
                    <button onclick="ayDegistir(-1)">◀</button>
                </div>
                <h2 id="takvimBaslik"></h2>
                <div class="takvim-nav">
                    <button onclick="ayDegistir(1)">▶</button>
                </div>
            </div>
            <div class="takvim-grid" id="takvimGrid"></div>
            <div class="istatistik-panel" style="margin-top:20px;">
                <h3>📊 Aylık Özet</h3>
                <div class="istatistik-grid" id="aylikOzet"></div>
            </div>
        </div>

        <!-- EKRAN 3: Kronometre -->
        <div class="screen" id="ekranKronometre">
            <div class="breadcrumb">
                <span class="breadcrumb-item" onclick="ekranGoster('ekranDersler')">Dersler</span>
                <span class="breadcrumb-sep">›</span>
                <span class="breadcrumb-item" onclick="ekranGoster('ekranTakvim')" id="breadcrumbDers2"></span>
                <span class="breadcrumb-sep">›</span>
                <span class="breadcrumb-item aktif" id="breadcrumbGun"></span>
            </div>
            <div class="kronometre-screen">
                <div class="kronometre-bilgi">
                    <span id="kronoDersAdi"></span> — <span id="kronoTarih"></span>
                </div>
                <div class="kronometre-label" id="kronoLabel"></div>
                <div class="kronometre-display" id="kronoDisplay">00:00:00</div>
                <div class="mola-display" id="molaDisplay"></div>
                <div class="kronometre-butonlar">
                    <button class="btn btn-success" id="btnBasla" onclick="kronometreBasla()">▶️ Başla</button>
                    <button class="btn btn-warning" id="btnDuraklat" onclick="kronometreDuraklat()" style="display:none;">⏸️ Mola</button>
                    <button class="btn btn-danger" id="btnDurdur" onclick="kronometreDurdur()" style="display:none;">⏹️ Durdur</button>
                    <button class="btn btn-accent" id="btnDevam" onclick="kronometreDevam()" style="display:none;">▶️ Devam</button>
                </div>
            </div>

            <div class="istatistik-panel" id="gunIstatistik" style="display:none;">
                <h3>📊 Bugünün Oturumları</h3>
                <div class="istatistik-grid" id="gunOzet"></div>
                <div class="oturum-listesi" id="oturumListesi"></div>
            </div>
        </div>
    </div>

    <!-- Gün Detay Modal -->
    <div class="gun-detay-overlay" id="gunDetayOverlay" onclick="gunDetayKapat(event)">
        <div class="gun-detay-modal" id="gunDetayModal"></div>
    </div>

    <script src="ders-calis-kronometrik-gh.js"></script>
    <script>
        // ===== Aşağıdaki GitHub Ayarları, ders-calis-kronometrik-gh.js dosyasından alınıyor. =====
        //const kullaniciAdi = "...";
        //const repoAdi = "...";
        //const token = "...";
        //const dosyaAdi = "...";

        // ===== Veri Yapısı =====
        let appData = {
            dersler: [],
            // dersler: [ { id, ad, kayitlar: { "2026-03-04": [ { baslangic, bitis, calisma, mola } ] } } ]
        };

        // ===== Durum =====
        let aktifDersId = null;
        let takvimYil = new Date().getFullYear();
        let takvimAy = new Date().getMonth();
        let aktifGun = null; // "2026-03-04"

        // Kronometre durumu
        let kronoState = 'idle'; // idle, running, paused
        let kronoStartTime = null;
        let kronoElapsed = 0;
        let kronoInterval = null;
        let molaStartTime = null;
        let molaElapsed = 0;
        let molaInterval = null;
        let toplamMolaSure = 0; // Bu oturumdaki toplam mola (ms)

        // ===== Yardımcı Fonksiyonlar =====
        function msToStr(ms) {
            if (!ms || ms < 0) ms = 0;
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function msToKisa(ms) {
            if (!ms || ms < 0) ms = 0;
            const totalMin = Math.floor(ms / 60000);
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            if (h > 0) return `${h}s${m}d`;
            return `${m}d`;
        }

        function bugunStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function tarihFormat(str) {
            const [y, m, d] = str.split('-');
            return `${d}.${m}.${y}`;
        }

        function bildirimGoster(msg) {
            const el = document.getElementById('bildirim');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function uid() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        // ===== LocalStorage =====
        function yerelKaydet() {
            localStorage.setItem('ders-calis-data', JSON.stringify(appData));
        }

        function yerelYukle() {
            const d = localStorage.getItem('ders-calis-data');
            if (d) {
                try { appData = JSON.parse(d); } catch (e) { }
            }
        }

        // ===== Ekran Yönetimi =====
        function ekranGoster(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            if (id === 'ekranDersler') {
                dersListesiRender();
            } else if (id === 'ekranTakvim') {
                takvimRender();
            } else if (id === 'ekranKronometre') {
                gunIstatistikRender();
            }
        }

        // ===== DERS İŞLEMLERİ =====
        function dersEkle() {
            const input = document.getElementById('yeniDersInput');
            const ad = input.value.trim();
            if (!ad) return;
            appData.dersler.push({ id: uid(), ad: ad, kayitlar: {} });
            input.value = '';
            yerelKaydet();
            dersListesiRender();
            bildirimGoster('📚 Ders eklendi: ' + ad);
        }

        document.getElementById('yeniDersInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') dersEkle();
        });

        function dersSil(id, e) {
            e.stopPropagation();
            if (!confirm('Bu dersi silmek istediğine emin misin?')) return;
            appData.dersler = appData.dersler.filter(d => d.id !== id);
            yerelKaydet();
            dersListesiRender();
            bildirimGoster('🗑️ Ders silindi');
        }

        function dersSec(id) {
            aktifDersId = id;
            takvimYil = new Date().getFullYear();
            takvimAy = new Date().getMonth();
            const ders = appData.dersler.find(d => d.id === id);
            document.getElementById('breadcrumbDers').textContent = ders.ad;
            document.getElementById('breadcrumbDers2').textContent = ders.ad;
            ekranGoster('ekranTakvim');
        }

        function dersListesiRender() {
            const container = document.getElementById('dersListesi');
            if (appData.dersler.length === 0) {
                container.innerHTML = `<div class="bos-durum">
                    <div class="bos-durum-icon">📖</div>
                    <p>Henüz ders eklenmedi.<br>Yukarıdan yeni ders ekle!</p>
                </div>`;
                return;
            }

            container.innerHTML = appData.dersler.map(ders => {
                // Toplam çalışma hesapla
                let toplamCalisma = 0;
                let toplamOturum = 0;
                Object.values(ders.kayitlar || {}).forEach(gunKayitlari => {
                    gunKayitlari.forEach(k => {
                        toplamCalisma += (k.calisma || 0);
                        toplamOturum++;
                    });
                });

                return `<div class="ders-item" onclick="dersSec('${ders.id}')">
                    <div class="ders-item-left">
                        <div class="ders-item-icon">📘</div>
                        <div>
                            <div class="ders-item-name">${ders.ad}</div>
                            <div class="ders-item-stats">${toplamOturum} oturum · ${msToKisa(toplamCalisma)} toplam</div>
                        </div>
                    </div>
                    <div class="ders-item-right">
                        <button class="ders-sil-btn" onclick="dersSil('${ders.id}', event)" title="Sil">🗑️</button>
                        <span class="ders-arrow">›</span>
                    </div>
                </div>`;
            }).join('');
        }

        // ===== TAKVİM =====
        const ayAdlari = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran',
            'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
        const gunAdlari = ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];

        function ayDegistir(yön) {
            takvimAy += yön;
            if (takvimAy < 0) { takvimAy = 11; takvimYil--; }
            if (takvimAy > 11) { takvimAy = 0; takvimYil++; }
            takvimRender();
        }

        function takvimRender() {
            const ders = appData.dersler.find(d => d.id === aktifDersId);
            if (!ders) return;

            document.getElementById('takvimBaslik').textContent = `${ayAdlari[takvimAy]} ${takvimYil}`;

            const grid = document.getElementById('takvimGrid');
            let html = gunAdlari.map(g => `<div class="takvim-gun-adi">${g}</div>`).join('');

            const ilkGun = new Date(takvimYil, takvimAy, 1);
            let baslangicGunu = ilkGun.getDay(); // 0=Paz
            baslangicGunu = baslangicGunu === 0 ? 6 : baslangicGunu - 1; // Pzt=0

            const gunSayisi = new Date(takvimYil, takvimAy + 1, 0).getDate();
            const bugunKey = bugunStr();

            // Boş günler
            for (let i = 0; i < baslangicGunu; i++) {
                html += `<div class="takvim-gun bos"></div>`;
            }

            // Ayın günleri
            let aylikToplamCalisma = 0;
            let aylikToplamMola = 0;
            let aylikToplamOturum = 0;

            for (let g = 1; g <= gunSayisi; g++) {
                const gunKey = `${takvimYil}-${String(takvimAy + 1).padStart(2, '0')}-${String(g).padStart(2, '0')}`;
                const kayitlar = ders.kayitlar[gunKey] || [];
                const bugunMu = gunKey === bugunKey;

                let gunCalisma = 0;
                let gunMola = 0;
                kayitlar.forEach(k => {
                    gunCalisma += (k.calisma || 0);
                    gunMola += (k.mola || 0);
                });

                aylikToplamCalisma += gunCalisma;
                aylikToplamMola += gunMola;
                aylikToplamOturum += kayitlar.length;

                let dataHtml = '';
                if (kayitlar.length > 0) {
                    dataHtml = `<div class="takvim-gun-data">
                        <div class="calisma">✅ ${msToKisa(gunCalisma)}</div>
                        <div class="mola">☕ ${msToKisa(gunMola)}</div>
                    </div>`;
                }

                html += `<div class="takvim-gun${bugunMu ? ' bugun' : ''}" onclick="gunSec('${gunKey}')">
                    <div class="takvim-gun-num">${g}</div>
                    ${dataHtml}
                </div>`;
            }

            grid.innerHTML = html;

            // Aylık özet
            const gunSayisiAktif = Object.keys(ders.kayitlar).filter(k => {
                const [y, m] = k.split('-');
                return parseInt(y) === takvimYil && parseInt(m) === takvimAy + 1;
            }).filter(k => (ders.kayitlar[k] || []).length > 0).length;

            document.getElementById('aylikOzet').innerHTML = `
                <div class="istatistik-item calisma">
                    <span class="value">${msToKisa(aylikToplamCalisma)}</span>
                    <span class="label">Toplam Çalışma</span>
                </div>
                <div class="istatistik-item mola">
                    <span class="value">${msToKisa(aylikToplamMola)}</span>
                    <span class="label">Toplam Mola</span>
                </div>
                <div class="istatistik-item oturum">
                    <span class="value">${aylikToplamOturum}</span>
                    <span class="label">Oturum Sayısı</span>
                </div>
                <div class="istatistik-item">
                    <span class="value" style="color:var(--accent)">${gunSayisiAktif}</span>
                    <span class="label">Aktif Gün</span>
                </div>
            `;
        }

        function gunSec(gunKey) {
            aktifGun = gunKey;
            const ders = appData.dersler.find(d => d.id === aktifDersId);
            document.getElementById('kronoDersAdi').textContent = ders.ad;
            document.getElementById('kronoTarih').textContent = tarihFormat(gunKey);
            document.getElementById('breadcrumbGun').textContent = tarihFormat(gunKey);

            // Kronometre sıfırla
            kronometreReset();
            ekranGoster('ekranKronometre');
        }

        // ===== KRONOMETRE =====
        function kronometreBasla() {
            kronoState = 'running';
            kronoStartTime = Date.now();
            kronoElapsed = 0;
            toplamMolaSure = 0;

            document.getElementById('btnBasla').style.display = 'none';
            document.getElementById('btnDuraklat').style.display = '';
            document.getElementById('btnDurdur').style.display = '';
            document.getElementById('btnDevam').style.display = 'none';

            document.getElementById('kronoLabel').textContent = '📖 ÇALIŞIYOR';
            document.getElementById('kronoLabel').className = 'kronometre-label calisma-label';
            document.getElementById('kronoDisplay').className = 'kronometre-display calisiyor';
            document.getElementById('molaDisplay').textContent = '';

            kronoInterval = setInterval(kronoGuncelle, 100);
        }

        function kronoGuncelle() {
            const now = Date.now();
            const elapsed = now - kronoStartTime + kronoElapsed;
            document.getElementById('kronoDisplay').textContent = msToStr(elapsed);
        }

        function kronometreDuraklat() {
            // Çalışma süresini kaydet
            kronoElapsed += Date.now() - kronoStartTime;
            clearInterval(kronoInterval);

            kronoState = 'paused';

            // Mola başlat
            molaStartTime = Date.now();
            molaElapsed = 0;
            molaInterval = setInterval(molaGuncelle, 100);

            document.getElementById('btnDuraklat').style.display = 'none';
            document.getElementById('btnDevam').style.display = '';

            document.getElementById('kronoLabel').textContent = '☕ MOLA';
            document.getElementById('kronoLabel').className = 'kronometre-label mola-label';
            document.getElementById('kronoDisplay').className = 'kronometre-display molada';
        }

        function molaGuncelle() {
            const now = Date.now();
            const elapsed = now - molaStartTime + molaElapsed;
            document.getElementById('molaDisplay').textContent = '☕ Mola: ' + msToStr(elapsed);
        }

        function kronometreDevam() {
            // Mola süresini kaydet
            molaElapsed += Date.now() - molaStartTime;
            toplamMolaSure += molaElapsed;
            clearInterval(molaInterval);
            molaElapsed = 0;

            kronoState = 'running';
            kronoStartTime = Date.now();

            document.getElementById('btnDuraklat').style.display = '';
            document.getElementById('btnDevam').style.display = 'none';

            document.getElementById('kronoLabel').textContent = '📖 ÇALIŞIYOR';
            document.getElementById('kronoLabel').className = 'kronometre-label calisma-label';
            document.getElementById('kronoDisplay').className = 'kronometre-display calisiyor';
            document.getElementById('molaDisplay').textContent = '';

            kronoInterval = setInterval(kronoGuncelle, 100);
        }

        function kronometreDurdur() {
            // Son çalışma / mola süresini topla
            if (kronoState === 'running') {
                kronoElapsed += Date.now() - kronoStartTime;
                clearInterval(kronoInterval);
            } else if (kronoState === 'paused') {
                molaElapsed += Date.now() - molaStartTime;
                toplamMolaSure += molaElapsed;
                clearInterval(molaInterval);
            }

            const calismaSuresi = kronoElapsed;
            const molaSuresi = toplamMolaSure;

            if (calismaSuresi < 1000) {
                bildirimGoster('⚠️ Çok kısa oturum, kaydedilmedi.');
                kronometreReset();
                return;
            }

            // Kaydet
            const ders = appData.dersler.find(d => d.id === aktifDersId);
            if (!ders.kayitlar[aktifGun]) ders.kayitlar[aktifGun] = [];

            const simdi = new Date();
            ders.kayitlar[aktifGun].push({
                saat: `${String(simdi.getHours()).padStart(2, '0')}:${String(simdi.getMinutes()).padStart(2, '0')}`,
                calisma: calismaSuresi,
                mola: molaSuresi
            });

            yerelKaydet();
            kronometreReset();
            gunIstatistikRender();

            bildirimGoster(`✅ Kaydedildi! Çalışma: ${msToStr(calismaSuresi)} · Mola: ${msToStr(molaSuresi)}`);
        }

        function kronometreReset() {
            clearInterval(kronoInterval);
            clearInterval(molaInterval);

            kronoState = 'idle';
            kronoStartTime = null;
            kronoElapsed = 0;
            molaStartTime = null;
            molaElapsed = 0;
            toplamMolaSure = 0;

            document.getElementById('kronoDisplay').textContent = '00:00:00';
            document.getElementById('kronoDisplay').className = 'kronometre-display';
            document.getElementById('molaDisplay').textContent = '';
            document.getElementById('kronoLabel').textContent = '';
            document.getElementById('kronoLabel').className = 'kronometre-label';

            document.getElementById('btnBasla').style.display = '';
            document.getElementById('btnDuraklat').style.display = 'none';
            document.getElementById('btnDurdur').style.display = 'none';
            document.getElementById('btnDevam').style.display = 'none';
        }

        function gunIstatistikRender() {
            const ders = appData.dersler.find(d => d.id === aktifDersId);
            if (!ders) return;

            const kayitlar = ders.kayitlar[aktifGun] || [];
            const panel = document.getElementById('gunIstatistik');

            if (kayitlar.length === 0) {
                panel.style.display = 'none';
                return;
            }

            panel.style.display = '';

            let topCalisma = 0;
            let topMola = 0;
            kayitlar.forEach(k => {
                topCalisma += (k.calisma || 0);
                topMola += (k.mola || 0);
            });

            document.getElementById('gunOzet').innerHTML = `
                <div class="istatistik-item calisma">
                    <span class="value">${msToStr(topCalisma)}</span>
                    <span class="label">Toplam Çalışma</span>
                </div>
                <div class="istatistik-item mola">
                    <span class="value">${msToStr(topMola)}</span>
                    <span class="label">Toplam Mola</span>
                </div>
                <div class="istatistik-item oturum">
                    <span class="value">${kayitlar.length}</span>
                    <span class="label">Oturum</span>
                </div>
            `;

            document.getElementById('oturumListesi').innerHTML = kayitlar.map((k, i) => `
                <div class="oturum-item">
                    <span class="saat">#${i + 1} · ${k.saat || '--:--'}</span>
                    <div>
                        <span class="sure c">${msToStr(k.calisma)}</span>
                        <span style="color:var(--text-muted);margin:0 4px;">·</span>
                        <span class="sure m">${msToStr(k.mola)}</span>
                    </div>
                </div>
            `).join('');
        }

        // ===== GÜN DETAY MODAL =====
        function gunDetayKapat(e) {
            if (e.target === document.getElementById('gunDetayOverlay')) {
                document.getElementById('gunDetayOverlay').classList.remove('active');
            }
        }

        // ===== GITHUB İŞLEMLERİ =====
        async function githubKaydet() {
            bildirimGoster('⏳ GitHub\'a kaydediliyor...');
            try {
                let sha = null;
                try {
                    const resp = await fetch(`https://api.github.com/repos/${kullaniciAdi}/${repoAdi}/contents/${dosyaAdi}`, {
                        headers: {
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    if (resp.ok) {
                        const fileData = await resp.json();
                        sha = fileData.sha;
                    }
                } catch (e) { }

                const jsonStr = JSON.stringify(appData, null, 2);
                const utf8 = unescape(encodeURIComponent(jsonStr));
                const base64 = btoa(utf8);

                const body = {
                    message: 'Ders çalışma verisi güncellendi - ' + new Date().toLocaleString('tr-TR'),
                    content: base64
                };
                if (sha) body.sha = sha;

                const updateResp = await fetch(`https://api.github.com/repos/${kullaniciAdi}/${repoAdi}/contents/${dosyaAdi}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(body)
                });

                if (!updateResp.ok) throw new Error('GitHub güncelleme hatası: ' + updateResp.status);
                bildirimGoster('✅ GitHub\'a kaydedildi!');
            } catch (err) {
                console.error(err);
                bildirimGoster('❌ GitHub kayıt hatası: ' + err.message);
            }
        }

        async function githubYukle() {
            bildirimGoster('⏳ GitHub\'dan yükleniyor...');
            try {
                const resp = await fetch(`https://api.github.com/repos/${kullaniciAdi}/${repoAdi}/contents/${dosyaAdi}`, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!resp.ok) {
                    bildirimGoster('⚠️ GitHub\'da veri bulunamadı!');
                    return;
                }

                const data = await resp.json();
                const decoded = decodeURIComponent(escape(atob(data.content)));
                const parsed = JSON.parse(decoded);

                appData = parsed;
                yerelKaydet();
                dersListesiRender();
                bildirimGoster('✅ GitHub\'dan yüklendi!');
            } catch (err) {
                console.error(err);
                bildirimGoster('❌ GitHub yükleme hatası: ' + err.message);
            }
        }

        // ===== BAŞLANGIÇ =====
        yerelYukle();
        dersListesiRender();
    </script>
</body>
</html>
